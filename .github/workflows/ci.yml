name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: web

jobs:
  # Clean install + build + unit tests on every OS we develop on. This is the
  # "works on my machine" guard: native deps (rolldown/esbuild bindings) and
  # lockfile resolution are platform-specific, so we exercise all three.
  build-test:
    name: build & unit (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  # Emulator-backed data/rules tests. Platform-independent logic, so Linux only.
  emulator:
    name: emulator tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - run: npm install -g firebase-tools
      - run: npm run test:rules
